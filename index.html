  const firebaseConfig = {
    databaseURL: "https://digital-seba-kendra-default-rtdb.firebaseio.com"

  // Expose to global for Babel/React code

  window.dispatchEvent(new Event('firebaseReady'));
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const FIREBASE_URL = "https://digital-seba-kendra-default-rtdb.firebaseio.com";

// Firebase REST API helpers (no SDK needed in Babel)
async function fbGet(path) {
  const res = await fetch(`${FIREBASE_URL}/${path}.json`);
  return res.json();
}
async function fbSet(path, data) {
  await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'PUT',
    body: JSON.stringify(data)
  });
}
async function fbPush(path, data) {
  const res = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json(); // returns {name: "-Nxxx..."}
}
async function fbDelete(path) {
  await fetch(`${FIREBASE_URL}/${path}.json`, { method: 'DELETE' });
}

const DEFAULT_SERVICES = [
  { id: 1, name: "নতুন জন্ম নিবন্ধন আবেদন", price: 150 },
  { id: 2, name: "জন্ম নিবন্ধন সংশোধন আবেদন", price: 150 },
  { id: 3, name: "জন্মনিবন্ধন বাংলা থেকে ইংরেজি/ডিজিটাল", price: 150 },
  { id: 4, name: "মৃত্যু সনদ আবেদন", price: 150 },
  { id: 5, name: "মৃত্যু সনদ সংশোধন আবেদন", price: 150 },
  { id: 6, name: "নতুন ভোটার আইডি কার্ড আবেদন", price: 150 },
  { id: 7, name: "ভোটার আইডি কার্ড সংশোধন আবেদন", price: 200 },
  { id: 8, name: "অনলাইন জিডি আবেদন", price: 250 },
  { id: 9, name: "টিন সার্টিফিকেট তৈরি", price: 150 },
  { id: 10, name: "জিরো রিটার্ন", price: 200 },
  { id: 11, name: "ই-চালান ভ্যাট ও আয়কর", price: 20 },
  { id: 12, name: "প্রত্যয়নপত্র", price: 30 },
  { id: 13, name: "দরখাস্ত", price: 60 },
  { id: 14, name: "পাসপোর্ট ও স্ট্যাম্প সাইজ ফটো (৪ পিস)", price: 40 },
];

function getTodayKey() { return new Date().toISOString().split("T")[0]; }
function formatDate(d) { return new Date(d).toLocaleDateString("bn-BD",{year:"numeric",month:"long",day:"numeric"}); }
function getWeekKey(d) { const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()); return dt.toISOString().split("T")[0]; }
function getMonthKey(d) { return d.slice(0,7); }
function getYearKey(d) { return d.slice(0,4); }
function bn(n) { return Number(n).toLocaleString("bn-BD"); }
function safeKey(s) { return s.replace(/[.#$\[\]@]/g,'_'); }

function PassInput({ placeholder, value, onChange, required, autoComplete }) {
  const [show, setShow] = useState(false);
  return (
    <div className="pass-wrap">
      <input type={show?"text":"password"} placeholder={placeholder} value={value} onChange={onChange} required={required} autoComplete={autoComplete}
        style={{width:"100%",padding:"10px 44px 10px 12px",border:"1.5px solid #ddd",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
      <button type="button" className="pass-eye" onClick={()=>setShow(s=>!s)}>{show?"🙈":"👁️"}</button>
    </div>
  );
}

function ManageTab({ services, setServices, showToast, btnD, user }) {
  const [newName, setNewName] = useState("");
  const [newPrice, setNewPrice] = useState("");
  const inp2 = {padding:"9px 12px",border:"1.5px solid #ddd",borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"};

  function addNew() {
    if(!newName.trim()){ showToast("❌ সেবার নাম লিখুন"); return; }
    const svc = { id: Date.now(), name: newName.trim(), price: parseFloat(newPrice)||0 };
    setServices(s => [...s, svc]);
    setNewName(""); setNewPrice("");
    showToast(`✅ "${svc.name}" সেবা যোগ হয়েছে`);
  }

  function deleteSvc(i, name) {
    if(!window.confirm(`"${name}" মুছে ফেলবেন?`)) return;
    setServices(s => s.filter((_,j) => j !== i));
    showToast(`🗑️ "${name}" মুছে ফেলা হয়েছে`);
  }

  return (
    <div>
      <h2 style={{margin:"0 0 6px",fontSize:20,fontWeight:700}}>⚙️ সেবা সম্পাদনা করুন</h2>
      <p style={{color:"#888",fontSize:13,margin:"0 0 16px"}}>সেবার নাম বা মূল্য পরিবর্তন করুন, নতুন সেবা যোগ করুন বা মুছুন।</p>

      {/* ➕ নতুন সেবা যোগ করার বক্স */}
      <div style={{background:"#fff",border:"2px dashed #1a1a1a",borderRadius:14,padding:"18px 16px",marginBottom:20}}>
        <h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:700,color:"#1a1a1a"}}>➕ নতুন সেবা তৈরি করুন</h3>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input
            type="text"
            placeholder="সেবার নাম লিখুন..."
            value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addNew()}
            style={{...inp2, flex:2, minWidth:180}}
          />
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontWeight:700,fontSize:15}}>৳</span>
            <input
              type="number"
              placeholder="মূল্য"
              value={newPrice}
              onChange={e=>setNewPrice(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addNew()}
              style={{...inp2, width:100}}
            />
          </div>
          <button onClick={addNew}
            style={{...btnD(true), whiteSpace:"nowrap", padding:"9px 20px"}}>
            ✅ যোগ করুন
          </button>
        </div>
      </div>

      {/* বিদ্যমান সেবার তালিকা */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {services.map((svc,i)=>(
          <div key={svc.id} style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"12px 14px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"#888",minWidth:22}}>{i+1}.</span>
            <input value={svc.name} onChange={e=>setServices(s=>s.map((x,j)=>j===i?{...x,name:e.target.value}:x))}
              style={{...inp2, flex:2, minWidth:150}}/>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontWeight:700}}>৳</span>
              <input type="number" value={svc.price} onChange={e=>setServices(s=>s.map((x,j)=>j===i?{...x,price:parseFloat(e.target.value)||0}:x))}
                style={{...inp2, width:85}}/>
            </div>
            <button onClick={()=>deleteSvc(i,svc.name)}
              title="মুছুন"
              style={{background:"#fff0f0",border:"1.5px solid #e74c3c",color:"#e74c3c",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:15,fontFamily:"inherit",fontWeight:700}}>
              🗑️
            </button>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button onClick={()=>{if(window.confirm("সব সেবা ডিফল্টে ফিরিয়ে আনবেন?"))setServices(DEFAULT_SERVICES);showToast("ডিফল্টে ফিরিয়ে আনা হয়েছে");}} style={btnD(false)}>🔄 ডিফল্টে ফিরুন</button>
        <button onClick={()=>showToast("পরিবর্তন সংরক্ষিত হয়েছে ✅")} style={btnD(true)}>💾 সংরক্ষণ করুন</button>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(()=>{ try{return JSON.parse(localStorage.getItem("dsUser"));}catch{return null;} });
  const [services, setServices] = useState(DEFAULT_SERVICES);
  const [transactions, setTransactions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [lf, setLf] = useState({contact:"",pass:"",confirm:""});
  const [lmode, setLmode] = useState("login");
  const [lerr, setLerr] = useState("");
  const [editSvc, setEditSvc] = useState(null);
  const [eQty, setEQty] = useState(1);
  const [ePrice, setEPrice] = useState("");
  const [eName, setEName] = useState("");
  const [toast, setToast] = useState("");
  const [rPeriod, setRPeriod] = useState("day");
  const [rDate, setRDate] = useState(getTodayKey());

  // Load user data from Firebase
  useEffect(()=>{
    if(!user) return;
    const uid = safeKey(user.contact);
    setLoading(true);
    Promise.all([
      fbGet(`users/${uid}/services`),
      fbGet(`users/${uid}/transactions`)
    ]).then(([svcs, txs])=>{
      if(svcs && Array.isArray(svcs)) setServices(svcs);
      else if(svcs && typeof svcs==='object') setServices(Object.values(svcs));
      if(txs && typeof txs==='object') {
        const arr = Object.entries(txs).map(([k,v])=>({...v, fbKey:k}));
        setTransactions(arr.sort((a,b)=>a.id-b.id));
      } else {
        setTransactions([]);
      }
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[user]);

  // Save services to Firebase whenever changed
  useEffect(()=>{
    if(!user) return;
    const uid = safeKey(user.contact);
    fbSet(`users/${uid}/services`, services);
  },[services]);

  function showToast(m){setToast(m);setTimeout(()=>setToast(""),2500);}

  async function handleAuth(e) {
    e.preventDefault();
    setLerr("");
    setLoading(true);
    const uid = safeKey(lf.contact);
    try {
      if(lmode==="register"){
        if(lf.pass !== lf.confirm){ setLerr("পাসওয়ার্ড দুটো মিলছে না।"); setLoading(false); return; }
        if(lf.pass.length < 6){ setLerr("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।"); setLoading(false); return; }
        const existing = await fbGet(`users/${uid}/profile`);
        if(existing){ setLerr("এই ইমেইল/নম্বর দিয়ে আগেই অ্যাকাউন্ট আছে।"); setLoading(false); return; }
        await fbSet(`users/${uid}/profile`, {contact: lf.contact, pass: lf.pass, createdAt: Date.now()});
        const newUser = {contact: lf.contact};
        localStorage.setItem("dsUser", JSON.stringify(newUser));
        setUser(newUser);
      } else {
        const profile = await fbGet(`users/${uid}/profile`);
        if(!profile || profile.pass !== lf.pass){ setLerr("ইমেইল/নম্বর বা পাসওয়ার্ড ভুল।"); setLoading(false); return; }
        const loggedUser = {contact: lf.contact};
        localStorage.setItem("dsUser", JSON.stringify(loggedUser));
        setUser(loggedUser);
      }
    } catch(err) {
      setLerr("সংযোগ সমস্যা। আবার চেষ্টা করুন।");
      setLoading(false);
    }
  }

  function handleLogout(){
    localStorage.removeItem("dsUser");
    setUser(null);
    setTransactions([]);
    setServices(DEFAULT_SERVICES);
  }

  function openAdd(svc){setEditSvc(svc);setEQty(1);setEPrice(String(svc.price));setEName(svc.name);}

  async function confirmAdd(){
    const qty=parseInt(eQty)||1, price=parseFloat(ePrice)||0;
    const tx={id:Date.now(),date:getTodayKey(),serviceId:editSvc.id,serviceName:eName,qty,price,total:qty*price};
    const uid=safeKey(user.contact);
    const result = await fbPush(`users/${uid}/transactions`, tx);
    setTransactions(p=>[...p,{...tx,fbKey:result.name}]);
    setEditSvc(null);
    showToast(`✅ "${eName}" যোগ হয়েছে`);
  }

  function getFiltered(period,key){
    return transactions.filter(tx=>{
      if(period==="day") return tx.date===key;
      if(period==="week") return getWeekKey(tx.date)===key;
      if(period==="month") return getMonthKey(tx.date)===key;
      if(period==="year") return getYearKey(tx.date)===key;
      return false;
    });
  }

  function groupTx(txs){
    const m={};
    txs.forEach(tx=>{
      if(!m[tx.serviceName]) m[tx.serviceName]={name:tx.serviceName,qty:0,total:0,price:tx.price};
      m[tx.serviceName].qty+=tx.qty; m[tx.serviceName].total+=tx.total;
    });
    return Object.values(m);
  }

  function printInvoice(period,key){
    const txs=getFiltered(period,key), grouped=groupTx(txs);
    const total=grouped.reduce((s,r)=>s+r.total,0);
    const pl={day:"দৈনিক",week:"সাপ্তাহিক",month:"মাসিক",year:"বার্ষিক"}[period];
    const dl=period==="day"?formatDate(key):period==="week"?`সপ্তাহ: ${formatDate(key)} থেকে`:period==="month"?key.replace("-"," - "):key+" সাল";
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${pl} ইনভয়েস</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Hind Siliguri',sans-serif;padding:28px;color:#1a1a1a}
.hdr{text-align:center;border-bottom:3px solid #1a1a1a;padding-bottom:14px;margin-bottom:18px}
.hdr h1{font-size:24px;margin:0 0 4px}.hdr p{font-size:13px;color:#555;margin:2px 0}
.badge{display:inline-block;background:#1a1a1a;color:#fff;padding:3px 14px;border-radius:20px;font-size:12px;margin-top:6px}
table{width:100%;border-collapse:collapse}th{background:#1a1a1a;color:#f5f0e8;padding:10px 12px;text-align:left;font-size:13px}
td{padding:9px 12px;border-bottom:1px solid #e8e2d6;font-size:13px}tr:nth-child(even) td{background:#faf8f4}
.tot td{font-weight:700;background:#f5f0e8;border-top:2px solid #1a1a1a;font-size:15px}
.ftr{margin-top:24px;text-align:center;font-size:11px;color:#999;border-top:1px solid #ddd;padding-top:10px}</style>
</head><body>
<div class="hdr"><h1>🏪 ডিজিটাল সেবা কেন্দ্র</h1><p>সকল সরকারি ও ডিজিটাল সেবা এক জায়গায়</p>
<span class="badge">${pl} ইনভয়েস — ${dl}</span></div>
<table><thead><tr><th>#</th><th>সেবার নাম</th><th>সংখ্যা</th><th>একক মূল্য</th><th>মোট</th></tr></thead>
<tbody>${grouped.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.qty}</td><td>৳${r.price}</td><td>৳${r.total}</td></tr>`).join("")}
<tr class="tot"><td colspan="4">মোট আয়</td><td>৳${total}</td></tr></tbody></table>
<div class="ftr">মুদ্রণ: ${new Date().toLocaleString("bn-BD")} | ধন্যবাদ সেবা গ্রহণ করার জন্য</div>
<script>window.onload=()=>window.print();<\/script></body></html>`);
    w.document.close();
  }

  const rKey=rPeriod==="day"?rDate:rPeriod==="week"?getWeekKey(rDate):rPeriod==="month"?getMonthKey(rDate):getYearKey(rDate);
  const rTxs=getFiltered(rPeriod,rKey), rGrouped=groupTx(rTxs), rTotal=rGrouped.reduce((s,r)=>s+r.total,0);
  const todayTxs=getFiltered("day",getTodayKey()), todayTotal=todayTxs.reduce((s,t)=>s+t.total,0);
  const monthTotal=getFiltered("month",getMonthKey(getTodayKey())).reduce((s,t)=>s+t.total,0);
  const yearTotal=getFiltered("year",getYearKey(getTodayKey())).reduce((s,t)=>s+t.total,0);

  const navItems=[{key:"dashboard",label:"ড্যাশবোর্ড",icon:"📊"},{key:"services",label:"সেবা যোগ",icon:"➕"},{key:"report",label:"রিপোর্ট",icon:"📋"},{key:"manage",label:"সেবা সম্পাদনা",icon:"⚙️"}];
  const inp={width:"100%",padding:"10px 12px",border:"1.5px solid #ddd",borderRadius:8,fontSize:14,fontFamily:"inherit"};
  const btnD=(a)=>({padding:"10px 20px",border:"2px solid #1a1a1a",borderRadius:8,background:a?"#1a1a1a":"#fff",color:a?"#f5f0e8":"#1a1a1a",fontWeight:600,cursor:"pointer",fontSize:14,fontFamily:"inherit"});
  const TH=({c})=><th style={{padding:"11px 14px",color:"#f5f0e8",textAlign:"left",fontSize:13,fontWeight:600,background:"#1a1a1a"}}>{c}</th>;
  const TD=({c,i,bold})=><td style={{padding:"10px 14px",fontSize:13,background:i%2===0?"#fff":"#faf8f4",fontWeight:bold?700:400}}>{c}</td>;

  // LOGIN PAGE
  if(!user) return (
    <div style={{minHeight:"100vh",background:"#f5f0e8",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 40px rgba(0,0,0,0.12)",padding:"40px 32px",width:"100%",maxWidth:380,border:"2px solid #1a1a1a"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:44,marginBottom:8}}>🏪</div>
          <h2 style={{margin:0,fontSize:22,fontWeight:700}}>ডিজিটাল সেবা কেন্দ্র</h2>
          <p style={{color:"#888",fontSize:13,margin:"4px 0 0"}}>আপনার সেবা ট্র্যাকার</p>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setLmode(m);setLerr("");}}
              style={{flex:1,padding:"9px 0",borderRadius:8,border:"2px solid #1a1a1a",background:lmode===m?"#1a1a1a":"#fff",color:lmode===m?"#f5f0e8":"#1a1a1a",fontWeight:600,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>
              {m==="login"?"লগইন":"নিবন্ধন"}
            </button>
          ))}
        </div>
        <form onSubmit={handleAuth} style={{display:"flex",flexDirection:"column",gap:12}}>
          <input type="text" placeholder="জিমেইল বা মোবাইল নম্বর" value={lf.contact} onChange={e=>setLf(f=>({...f,contact:e.target.value}))} required style={inp}/>
          <PassInput placeholder="পাসওয়ার্ড" value={lf.pass} onChange={e=>setLf(f=>({...f,pass:e.target.value}))} required autoComplete={lmode==="login"?"current-password":"new-password"}/>
          {lmode==="register"&&(
            <PassInput placeholder="পাসওয়ার্ড নিশ্চিত করুন" value={lf.confirm} onChange={e=>setLf(f=>({...f,confirm:e.target.value}))} required autoComplete="new-password"/>
          )}
          {lerr&&<p style={{color:"#c0392b",fontSize:13,textAlign:"center",margin:0}}>{lerr}</p>}
          <button type="submit" disabled={loading} style={{...btnD(true),width:"100%",padding:"12px 0",fontSize:15,opacity:loading?0.7:1}}>
            {loading?"অপেক্ষা করুন...":lmode==="login"?"লগইন করুন":"অ্যাকাউন্ট তৈরি করুন"}
          </button>
        </form>
        <p style={{textAlign:"center",fontSize:12,color:"#aaa",marginTop:14}}>বিনামূল্যে অ্যাকাউন্ট তৈরি করুন ✅</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f5f0e8"}}>
      {/* Header */}
      <div style={{background:"#1a1a1a",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🏪</span>
          <span style={{color:"#f5f0e8",fontWeight:700,fontSize:17}}>ডিজিটাল সেবা কেন্দ্র</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#aaa",fontSize:12}}>👤 {user.contact}</span>
          <button onClick={handleLogout} style={{background:"transparent",border:"1px solid #555",color:"#ccc",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>লগআউট</button>
        </div>
      </div>

      {/* Nav */}
      <div style={{background:"#fff",borderBottom:"2px solid #e8e2d6",display:"flex",padding:"0 16px",overflowX:"auto"}}>
        {navItems.map(n=>(
          <button key={n.key} className="nav-tab" onClick={()=>setTab(n.key)}
            style={{padding:"12px 16px",border:"none",background:tab===n.key?"#f5f0e8":"transparent",color:tab===n.key?"#1a1a1a":"#666",fontWeight:tab===n.key?700:500,cursor:"pointer",fontSize:14,fontFamily:"inherit",borderBottom:tab===n.key?"3px solid #1a1a1a":"3px solid transparent",whiteSpace:"nowrap",transition:"all .2s"}}>
            {n.icon} {n.label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"40px",color:"#888",fontSize:15}}>ডেটা লোড হচ্ছে... ⏳</div>}

      {!loading&&<div style={{maxWidth:900,margin:"0 auto",padding:"24px 16px"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div>
            <h2 style={{margin:"0 0 20px",fontSize:20,fontWeight:700}}>📊 আজকের সারসংক্ষেপ</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14,marginBottom:28}}>
              {[
                {label:"আজকের আয়",value:`৳${bn(todayTotal)}`,sub:`${todayTxs.length} টি এন্ট্রি`,dark:true},
                {label:"মাসিক আয়",value:`৳${bn(monthTotal)}`,sub:getMonthKey(getTodayKey()),dark:false},
                {label:"বার্ষিক আয়",value:`৳${bn(yearTotal)}`,sub:getYearKey(getTodayKey())+" সাল",dark:false},
              ].map((s,i)=>(
                <div key={i} style={{background:s.dark?"#1a1a1a":"#fff",border:"2px solid #1a1a1a",borderRadius:14,padding:"20px",boxShadow:"4px 4px 0 #1a1a1a"}}>
                  <p style={{margin:"0 0 6px",fontSize:13,color:s.dark?"#aaa":"#888"}}>{s.label}</p>
                  <p style={{margin:"0 0 4px",fontSize:26,fontWeight:700,color:s.dark?"#f5f0e8":"#1a1a1a"}}>{s.value}</p>
                  <p style={{margin:0,fontSize:12,color:s.dark?"#666":"#bbb"}}>{s.sub}</p>
                </div>
              ))}
            </div>
            <h3 style={{margin:"0 0 12px",fontSize:16,fontWeight:700}}>আজকের এন্ট্রি</h3>
            {todayTxs.length===0
              ?<div style={{background:"#fff",border:"2px dashed #ddd",borderRadius:12,padding:"36px",textAlign:"center",color:"#aaa"}}>আজ কোনো সেবা যোগ করা হয়নি</div>
              :<div style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["সময়","সেবার নাম","সংখ্যা","মূল্য","মোট"].map(h=><TH key={h} c={h}/>)}</tr></thead>
                  <tbody>{todayTxs.map((tx,i)=>(
                    <tr key={tx.id}>
                      <TD c={new Date(tx.id).toLocaleTimeString("bn-BD",{hour:"2-digit",minute:"2-digit"})} i={i}/>
                      <TD c={tx.serviceName} i={i}/><TD c={bn(tx.qty)} i={i}/><TD c={`৳${bn(tx.price)}`} i={i}/>
                      <TD c={`৳${bn(tx.total)}`} i={i} bold/>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            }
            {todayTxs.length>0&&<button onClick={()=>printInvoice("day",getTodayKey())} style={{...btnD(true),marginTop:14}}>🖨️ আজকের ইনভয়েস প্রিন্ট করুন</button>}
          </div>
        )}

        {/* SERVICES */}
        {tab==="services"&&(
          <div>
            <h2 style={{margin:"0 0 6px",fontSize:20,fontWeight:700}}>➕ সেবা যোগ করুন</h2>
            <p style={{color:"#888",fontSize:13,margin:"0 0 20px"}}>যেকোনো সেবার বাটনে ক্লিক করুন।</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:12}}>
              {services.map(svc=>(
                <button key={svc.id} className="svc-btn" onClick={()=>openAdd(svc)}
                  style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"16px 14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",transition:"all .2s",boxShadow:"3px 3px 0 #1a1a1a"}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",marginBottom:6,lineHeight:1.4}}>{svc.name}</div>
                  <div style={{fontSize:20,fontWeight:700}}>৳{bn(svc.price)}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* REPORT */}
        {tab==="report"&&(
          <div>
            <h2 style={{margin:"0 0 20px",fontSize:20,fontWeight:700}}>📋 রিপোর্ট ও হিসাব</h2>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {[["day","দৈনিক"],["week","সাপ্তাহিক"],["month","মাসিক"],["year","বার্ষিক"]].map(([k,l])=>(
                <button key={k} onClick={()=>setRPeriod(k)} style={{...btnD(rPeriod===k),borderRadius:20,padding:"8px 18px"}}>{l}</button>
              ))}
            </div>
            <div style={{marginBottom:20}}>
              <input type="date" value={rDate} onChange={e=>setRDate(e.target.value)}
                style={{padding:"9px 14px",border:"2px solid #1a1a1a",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
            </div>
            {rGrouped.length===0
              ?<div style={{background:"#fff",border:"2px dashed #ddd",borderRadius:12,padding:"40px",textAlign:"center",color:"#aaa"}}>এই সময়ের জন্য কোনো ডেটা নেই</div>
              :<>
                <div style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,overflow:"hidden",marginBottom:16}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>{["ক্রমিক","সেবার নাম","সংখ্যা","একক মূল্য","মোট"].map(h=><TH key={h} c={h}/>)}</tr></thead>
                    <tbody>
                      {rGrouped.map((r,i)=>(
                        <tr key={i}>
                          <TD c={bn(i+1)} i={i}/><TD c={r.name} i={i}/><TD c={bn(r.qty)} i={i}/>
                          <TD c={`৳${bn(r.price)}`} i={i}/><TD c={`৳${bn(r.total)}`} i={i} bold/>
                        </tr>
                      ))}
                      <tr style={{borderTop:"2px solid #1a1a1a"}}>
                        <td colSpan={4} style={{padding:"12px 14px",fontWeight:700,fontSize:14,background:"#f5f0e8"}}>মোট আয়</td>
                        <td style={{padding:"12px 14px",fontWeight:700,fontSize:16,background:"#f5f0e8"}}>৳{bn(rTotal)}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <button onClick={()=>printInvoice(rPeriod,rKey)} style={btnD(true)}>🖨️ ইনভয়েস প্রিন্ট / PDF করুন</button>
              </>
            }
          </div>
        )}

        {/* MANAGE */}
        {tab==="manage"&&(
          <ManageTab services={services} setServices={setServices} showToast={showToast} btnD={btnD} user={user}/>
        )}
      </div>}

      {/* Modal */}
      {editSvc&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:380,border:"2px solid #1a1a1a",boxShadow:"6px 6px 0 #1a1a1a"}}>
            <h3 style={{margin:"0 0 20px",fontSize:17,fontWeight:700}}>সেবা যোগ করুন</h3>
            {[{label:"সেবার নাম",type:"text",val:eName,set:setEName},{label:"মূল্য (৳)",type:"number",val:ePrice,set:setEPrice},{label:"সংখ্যা",type:"number",val:eQty,set:setEQty,min:1}].map(f=>(
              <div key={f.label} style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:13,color:"#555",marginBottom:4}}>{f.label}</label>
                <input type={f.type} value={f.val} min={f.min} onChange={e=>f.set(e.target.value)} style={inp}/>
              </div>
            ))}
            <div style={{background:"#f5f0e8",border:"1.5px solid #ddd",borderRadius:8,padding:"10px 14px",marginBottom:20,textAlign:"center"}}>
              <span style={{fontSize:14,color:"#555"}}>মোট: </span>
              <span style={{fontSize:22,fontWeight:700}}>৳{bn((parseFloat(ePrice)||0)*(parseInt(eQty)||1))}</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditSvc(null)} style={{...btnD(false),flex:1}}>বাতিল</button>
              <button onClick={confirmAdd} style={{...btnD(true),flex:1}}>✅ যোগ করুন</button>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#f5f0e8",padding:"12px 24px",borderRadius:30,fontSize:14,fontWeight:600,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
