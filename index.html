function getTodayKey(){return new Date().toISOString().split("T")[0];}
function getMonthKey(d){return d.slice(0,7);}
function getYearKey(d){return d.slice(0,4);}
function getWeekKey(d){const dt=new Date(d);dt.setDate(dt.getDate()-dt.getDay());return dt.toISOString().split("T")[0];}

// লাইভ ঘড়ি
function LiveClock(){
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const pad=n=>String(n).padStart(2,'0');
  const h=pad(now.getHours()),m=pad(now.getMinutes()),s=pad(now.getSeconds());
  const days=["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];
  const months=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
  return(
    <div style={{background:`linear-gradient(135deg,${C.g},${C.gl})`,borderRadius:16,padding:"18px 20px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div>
        <div style={{fontSize:11,opacity:0.7,marginBottom:4}}>{days[now.getDay()]}, {now.getDate()} {months[now.getMonth()]} {now.getFullYear()}</div>
        <div style={{fontSize:32,fontWeight:700,letterSpacing:2,fontVariantNumeric:"tabular-nums"}}>
          {h}<span className="clock-dot">:</span>{m}<span style={{fontSize:20,opacity:0.8}}>:{s}</span>
        </div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:11,opacity:0.7,marginBottom:4}}>আজকের তারিখ</div>
        <div style={{fontSize:14,fontWeight:600}}>{now.toLocaleDateString("bn-BD",{day:"numeric",month:"long",year:"numeric"})}</div>
      </div>
    </div>
  );
}

// ক্যালেন্ডার
function MiniCalendar({transactions}){
  const [cur,setCur]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const today=new Date();
  const months=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
  const days=["রবি","সোম","মঙ্গ","বুধ","বৃহ","শুক্র","শনি"];
  const firstDay=new Date(cur.y,cur.m,1).getDay();
  const daysInMonth=new Date(cur.y,cur.m+1,0).getDate();
  // যে তারিখগুলোতে লেনদেন আছে
  const txDates=new Set(transactions.filter(tx=>{
    const d=new Date(tx.date);
    return d.getFullYear()===cur.y&&d.getMonth()===cur.m;
  }).map(tx=>new Date(tx.date).getDate()));

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const prev=()=>setCur(c=>c.m===0?{y:c.y-1,m:11}:{y:c.y,m:c.m-1});
  const next=()=>setCur(c=>c.m===11?{y:c.y+1,m:0}:{y:c.y,m:c.m+1});

  return(
    <div style={{background:C.w,border:`1.5px solid ${C.b}`,borderRadius:16,padding:"16px",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={prev} style={{background:"none",border:`1px solid ${C.b}`,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:C.g}}>‹</button>
        <span style={{fontWeight:700,fontSize:14,color:C.g}}>{months[cur.m]} {cur.y}</span>
        <button onClick={next} style={{background:"none",border:`1px solid ${C.b}`,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:C.g}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {days.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:600,color:C.m,padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const isToday=d===today.getDate()&&cur.m===today.getMonth()&&cur.y===today.getFullYear();
          const hasTx=txDates.has(d);
          return(
            <div key={i} className={`cal-day${hasTx?" cal-day-has-tx":""}`}
              style={{textAlign:"center",fontSize:12,padding:"5px 2px",cursor:"default",fontWeight:isToday?700:400,background:isToday?C.g:"transparent",color:isToday?"#fff":C.t,borderRadius:isToday?"50%":"4px",position:"relative"}}>
              {d}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:10,display:"flex",gap:12,fontSize:11,color:C.m}}>

function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("dsUser"));}catch{return null;}});
  const [services,setServices]=useState(DEFAULT_SERVICES);
  const [transactions,setTransactions]=useState([]);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [lf,setLf]=useState({contact:"",pass:"",confirm:""});
  const [lmode,setLmode]=useState("login");
  const [lerr,setLerr]=useState("");
  const [editSvc,setEditSvc]=useState(null);
  const [eQty,setEQty]=useState(1);
  const [ePrice,setEPrice]=useState("");
  const [eName,setEName]=useState("");
  const [toast,setToast]=useState("");
  const [rPeriod,setRPeriod]=useState("day");
  const [rDate,setRDate]=useState(getTodayKey());
  const [showAuthModal,setShowAuthModal]=useState(false);
  const [authInitMode,setAuthInitMode]=useState("login");

  useEffect(()=>{
    if(!user)return;
    const uid=safeKey(user.contact);setLoading(true);
    Promise.all([fbGet(`users/${uid}/services`),fbGet(`users/${uid}/transactions`)]).then(([svcs,txs])=>{
      if(svcs&&Array.isArray(svcs))setServices(svcs);
      else if(svcs&&typeof svcs==='object'&&!Array.isArray(svcs))setServices(Object.values(svcs));
      if(txs&&typeof txs==='object'){const arr=Object.entries(txs).map(([k,v])=>({...v,fbKey:k}));setTransactions(arr.sort((a,b)=>a.id-b.id));}
      else setTransactions([]);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[user]);

  useEffect(()=>{if(!user)return;fbSet(`users/${safeKey(user.contact)}/services`,services);},[services]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2600);}

  function openAuth(mode){setAuthInitMode(mode);setLmode(mode);setLerr("");setShowAuthModal(true);}

  async function handleAuth(e){
    if(e&&e.preventDefault)e.preventDefault();
    setLerr("");setLoading(true);
    const uid=safeKey(lf.contact);
    try{
      if(lmode==="register"){
        if(lf.pass!==lf.confirm){setLerr("পাসওয়ার্ড দুটো মিলছে না।");setLoading(false);return;}
        if(lf.pass.length<6){setLerr("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে।");setLoading(false);return;}
        const ex=await fbGet(`users/${uid}/profile`);
        if(ex){setLerr("এই ইমেইল/নম্বর দিয়ে আগেই অ্যাকাউন্ট আছে।");setLoading(false);return;}
        await fbSet(`users/${uid}/profile`,{contact:lf.contact,pass:lf.pass,createdAt:Date.now()});
        const nu={contact:lf.contact};localStorage.setItem("dsUser",JSON.stringify(nu));setUser(nu);setShowAuthModal(false);
      }else{
        const p=await fbGet(`users/${uid}/profile`);
        if(!p||p.pass!==lf.pass){setLerr("ইমেইল/নম্বর বা পাসওয়ার্ড ভুল।");setLoading(false);return;}
        const lu={contact:lf.contact};localStorage.setItem("dsUser",JSON.stringify(lu));setUser(lu);setShowAuthModal(false);
      }
    }catch{setLerr("সংযোগ সমস্যা। আবার চেষ্টা করুন।");setLoading(false);}
  }

  function handleLogout(){localStorage.removeItem("dsUser");setUser(null);setTransactions([]);setServices(DEFAULT_SERVICES);}

  function openAdd(svc){if(!user){openAuth("login");return;}setEditSvc(svc);setEQty(1);setEPrice(String(svc.price));setEName(svc.name);}

  async function confirmAdd(){
    const qty=parseInt(eQty)||1,price=parseFloat(ePrice)||0;
    const tx={id:Date.now(),date:getTodayKey(),serviceId:editSvc.id,serviceName:eName,qty,price,total:qty*price};
    const res=await fbPush(`users/${safeKey(user.contact)}/transactions`,tx);
    setTransactions(p=>[...p,{...tx,fbKey:res.name}]);
    setEditSvc(null);showToast(`✅ "${eName}" যোগ হয়েছে`);
  }

  function getFiltered(period,key){return transactions.filter(tx=>{if(period==="day")return tx.date===key;if(period==="week")return getWeekKey(tx.date)===key;if(period==="month")return getMonthKey(tx.date)===key;if(period==="year")return getYearKey(tx.date)===key;return false;});}
  function groupTx(txs){const m={};txs.forEach(tx=>{if(!m[tx.serviceName])m[tx.serviceName]={name:tx.serviceName,qty:0,total:0,price:tx.price};m[tx.serviceName].qty+=tx.qty;m[tx.serviceName].total+=tx.total;});return Object.values(m);}

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditSvc(null)} style={{...bs(false),flex:1}}>বাতিল</button>
              <button onClick={confirmAdd} style={{...bs(true),flex:1}}>✅ যোগ করুন</button>
            </div>
          </div>
        </div>
      )}

      {/* টোস্ট */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.g,color:"#fff",padding:"12px 24px",borderRadius:30,fontSize:14,fontWeight:600,zIndex:400,boxShadow:"0 4px 20px rgba(26,77,46,0.38)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* ফুটার */}
      <footer style={{background:C.gd,color:"rgba(255,255,255,0.6)",padding:"22px 20px",marginTop:32}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🏪</span>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:14,lineHeight:1.2}}>ডিজিটাল সেবা কেন্দ্র</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>সকল সরকারি ও ডিজিটাল সেবা এক জায়গায়</div>
            </div>
          </div>
          <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
            {[{key:"dashboard",label:"📊 ড্যাশবোর্ড"},{key:"services",label:"➕ সেবা যোগ"},{key:"report",label:"📋 রিপোর্ট"},{key:"manage",label:"⚙️ সম্পাদনা"}].map(n=>(
              <span key={n.key} onClick={()=>setTab(n.key)} style={{fontSize:12,color:"rgba(255,255,255,0.5)",cursor:"pointer",transition:"color .2s"}}
                onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.5)"}>
                {n.label}
              </span>
            ))}
          </div>
          <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.3)"}}>© {new Date().getFullYear()} সর্বস্বত্ব সংরক্ষিত 🇧🇩</p>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
